global:
  scrape_interval: 5s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
  - job_name: campaign-service
    static_configs:
      - targets: ["campaign-service:8000"]
  - job_name: ad-decision-service
    static_configs:
      - targets: ["ad-decision-service:8000"]

# Remaining substrate services register here as they are built (Day 4+).

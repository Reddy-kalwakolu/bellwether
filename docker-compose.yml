name: bellwether

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bellwether
      POSTGRES_PASSWORD: bellwether
      POSTGRES_DB: bellwether
    # host port 5433: 5432 is commonly taken by other local Postgres instances
    ports: ["5433:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bellwether"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    # host port 6380: 6379 is commonly taken by other local Redis instances
    ports: ["6380:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  prometheus:
    image: prom/prometheus:v2.53.0
    ports: ["9090:9090"]
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.1.0
    ports: ["3000:3000"]
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro

  campaign-service:
    build:
      context: .
      dockerfile: substrate/campaign_service/Dockerfile
    environment:
      CAMPAIGN_DATABASE_URL: postgresql+psycopg://bellwether:bellwether@postgres:5432/bellwether
    ports: ["8001:8000"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 3s
      retries: 5

  ad-decision-service:
    build:
      context: .
      dockerfile: substrate/ad_decision_service/Dockerfile
    environment:
      AD_DECISION_CAMPAIGN_SERVICE_URL: http://campaign-service:8000
      AD_DECISION_REDIS_URL: redis://redis:6379/0
    ports: ["8002:8000"]
    depends_on:
      redis:
        condition: service_healthy
      campaign-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 3s
      retries: 5

  event-service:
    build:
      context: .
      dockerfile: substrate/event_service/Dockerfile
    environment:
      EVENT_DATABASE_URL: postgresql+psycopg://bellwether:bellwether@postgres:5432/bellwether
    ports: ["8003:8000"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 3s
      retries: 5

  traffic-simulator:
    build:
      context: .
      dockerfile: substrate/traffic_simulator/Dockerfile
    environment:
      SIM_CAMPAIGN_SERVICE_URL: http://campaign-service:8000
      SIM_AD_DECISION_URL: http://ad-decision-service:8000
      SIM_EVENT_SERVICE_URL: http://event-service:8000
    ports: ["8004:8000"]
    depends_on:
      campaign-service:
        condition: service_healthy
      ad-decision-service:
        condition: service_healthy
      event-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  pgdata:

networks:
  default:
    name: bellwether
